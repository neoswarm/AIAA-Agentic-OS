{% extends "base.html" %}

{% block title %}Running Skill - AIAA{% endblock %}

{% block extra_css %}
<style>
/* Progress Header */
.progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.progress-header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.progress-header-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
}

.progress-header-icon svg {
    width: 22px;
    height: 22px;
    animation: spin 1.2s linear infinite;
}

.progress-header-icon.done svg {
    animation: none;
}

.progress-title {
    font-size: 1.25rem;
    font-weight: 600;
}

.progress-meta {
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 0.125rem;
}

/* Progress Bar */
.progress-bar-wrapper {
    margin-bottom: 2rem;
}

.progress-bar-track {
    width: 100%;
    height: 8px;
    background: var(--bg-elevated);
    border-radius: 9999px;
    overflow: hidden;
}

.progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 9999px;
    transition: width 0.5s ease;
    width: 0%;
}

.progress-bar-fill.success {
    background: var(--success);
}

.progress-bar-fill.error {
    background: var(--error);
}

.progress-bar-label {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.8125rem;
    color: var(--text-muted);
}

/* Step List */
.steps-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    overflow: hidden;
}

.steps-card .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.steps-list {
    padding: 0.75rem 0;
}

.step-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
}

.step-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.step-icon.pending {
    border: 2px solid var(--border);
    background: transparent;
}

.step-icon.running {
    border: 2px solid var(--accent);
    background: var(--accent-muted);
    color: var(--accent);
}

.step-icon.running svg {
    animation: spin 1s linear infinite;
}

.step-icon.done {
    background: var(--success);
    color: white;
}

.step-icon.error {
    background: var(--error);
    color: white;
}

.step-icon svg {
    width: 14px;
    height: 14px;
}

.step-label {
    flex: 1;
    font-size: 0.875rem;
    color: var(--text-primary);
}

.step-label.muted {
    color: var(--text-muted);
}

.step-duration {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    min-width: 40px;
    text-align: right;
}

/* Live Output */
.output-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    overflow: hidden;
}

.output-card .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.live-output {
    background: var(--bg-base);
    padding: 1rem 1.25rem;
    max-height: 320px;
    overflow-y: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.8125rem;
    line-height: 1.7;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
}

.live-output:empty::before {
    content: 'Waiting for output...';
    color: var(--text-muted);
    font-style: italic;
}

/* Cancel Button */
.btn-cancel {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    background: var(--error-muted);
    border: 1px solid var(--error);
    border-radius: 8px;
    color: var(--error);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
}

.btn-cancel:hover {
    background: var(--error);
    color: white;
}

.btn-cancel:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* Completion banner */
.completion-banner {
    display: none;
    padding: 1.25rem 1.5rem;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    align-items: center;
    gap: 1rem;
}

.completion-banner.visible {
    display: flex;
}

.completion-banner.banner-success {
    background: var(--success-muted);
    border: 1px solid var(--success);
    color: var(--success);
}

.completion-banner.banner-error {
    background: var(--error-muted);
    border: 1px solid var(--error);
    color: var(--error);
}

.completion-banner .banner-text {
    flex: 1;
    font-weight: 500;
}

.completion-banner .btn {
    flex-shrink: 0;
}

/* Responsive */
@media (max-width: 600px) {
    .progress-header {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
{% endblock %}

{% block content %}
<!-- Progress Header -->
<div class="progress-header">
    <div class="progress-header-left">
        <div class="progress-header-icon" id="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
        </div>
        <div>
            <div class="progress-title" id="progress-title">Running skill...</div>
            <div class="progress-meta" id="progress-meta">Starting</div>
        </div>
    </div>
    <button class="btn-cancel" id="btn-cancel" onclick="cancelExecution()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Cancel
    </button>
</div>

<!-- Progress Bar -->
<div class="progress-bar-wrapper">
    <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-bar-label">
        <span id="progress-step-label">Starting...</span>
        <span id="progress-percent">0%</span>
    </div>
</div>

<!-- Completion Banner -->
<div class="completion-banner" id="completion-banner">
    <span class="banner-text" id="banner-text"></span>
    <a class="btn" id="banner-action" href="#">View Output</a>
</div>

<!-- Steps -->
<div class="steps-card">
    <div class="card-header">
        <span class="card-title">Steps</span>
        <span class="badge badge-muted" id="step-counter">0 / 0</span>
    </div>
    <div class="steps-list" id="steps-list">
        <!-- Steps rendered dynamically by JS -->
    </div>
</div>

<!-- Live Output -->
<div class="output-card">
    <div class="card-header">
        <span class="card-title">Live Output</span>
        <span class="badge badge-info" id="output-status">streaming</span>
    </div>
    <div class="live-output" id="live-output"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var pollInterval = null;
    var executionId = getExecutionIdFromUrl();
    var skillName = getSkillNameFromUrl();
    var startTime = Date.now();

    function getExecutionIdFromUrl() {
        var parts = window.location.pathname.split('/');
        return parts[parts.length - 1] || null;
    }

    function getSkillNameFromUrl() {
        var parts = window.location.pathname.split('/');
        var idx = parts.indexOf('skills');
        if (idx >= 0 && parts[idx + 1]) return decodeURIComponent(parts[idx + 1]);
        return null;
    }

    function formatSkillName(name) {
        return (name || '').replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function formatDuration(ms) {
        var secs = Math.floor(ms / 1000);
        var mins = Math.floor(secs / 60);
        secs = secs % 60;
        if (mins > 0) return mins + 'm ' + secs + 's';
        return secs + 's';
    }

    // Initialize
    document.getElementById('progress-title').textContent = 'Running: ' + formatSkillName(skillName);

    // Poll for status
    function startPolling() {
        if (!executionId) return;

        pollStatus();
        pollInterval = setInterval(pollStatus, 2000);
    }

    async function pollStatus() {
        try {
            var res = await fetch('/api/v2/executions/' + encodeURIComponent(executionId) + '/status');
            if (!res.ok) throw new Error('Status request failed');
            var data = await res.json();

            updateProgress(data);

            if (data.status === 'success' || data.status === 'error' || data.status === 'cancelled') {
                clearInterval(pollInterval);
                onComplete(data);
            }
        } catch (e) {
            console.warn('Poll error:', e);
            showToast('Failed to fetch execution status', 'error');
        }
    }

    function updateProgress(data) {
        var elapsed = formatDuration(Date.now() - startTime);
        var metaText = 'Started ' + elapsed + ' ago';
        if (data.estimated_time) {
            metaText += ' | Estimated: ~' + data.estimated_time;
        }
        document.getElementById('progress-meta').textContent = metaText;

        // Update progress bar
        var steps = data.steps || [];
        var totalSteps = steps.length || 1;
        var completedSteps = steps.filter(function(s) { return s.status === 'done'; }).length;
        var runningSteps = steps.filter(function(s) { return s.status === 'running'; }).length;
        var pct = Math.round(((completedSteps + runningSteps * 0.5) / totalSteps) * 100);

        var fill = document.getElementById('progress-fill');
        fill.style.width = pct + '%';
        document.getElementById('progress-percent').textContent = pct + '%';
        document.getElementById('progress-step-label').textContent = 'Step ' + (completedSteps + (runningSteps > 0 ? 1 : 0)) + ' of ' + totalSteps;
        document.getElementById('step-counter').textContent = completedSteps + ' / ' + totalSteps;

        // Render steps
        renderSteps(steps);

        // Update live output
        if (data.output) {
            var outputEl = document.getElementById('live-output');
            outputEl.textContent = data.output;
            outputEl.scrollTop = outputEl.scrollHeight;
        }
    }

    function renderSteps(steps) {
        var list = document.getElementById('steps-list');
        if (!steps || steps.length === 0) {
            list.innerHTML = '<div class="step-item"><span class="step-label muted">Waiting for steps...</span></div>';
            return;
        }

        list.innerHTML = '';
        steps.forEach(function(step) {
            var item = document.createElement('div');
            item.className = 'step-item';

            var iconHtml;
            if (step.status === 'done') {
                iconHtml = '<div class="step-icon done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>';
            } else if (step.status === 'running') {
                iconHtml = '<div class="step-icon running"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg></div>';
            } else if (step.status === 'error') {
                iconHtml = '<div class="step-icon error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>';
            } else {
                iconHtml = '<div class="step-icon pending"></div>';
            }

            var labelClass = step.status === 'pending' ? 'step-label muted' : 'step-label';
            var durationText = step.duration ? formatDuration(step.duration) : '';

            item.innerHTML = iconHtml
                + '<span class="' + labelClass + '">' + escapeHtml(step.name || 'Step') + '</span>'
                + '<span class="step-duration">' + durationText + '</span>';

            list.appendChild(item);
        });
    }

    function onComplete(data) {
        var banner = document.getElementById('completion-banner');
        var fill = document.getElementById('progress-fill');
        var headerIcon = document.getElementById('header-icon');
        var cancelBtn = document.getElementById('btn-cancel');
        var outputStatus = document.getElementById('output-status');

        cancelBtn.disabled = true;
        headerIcon.classList.add('done');
        outputStatus.textContent = 'complete';
        outputStatus.className = 'badge badge-muted';

        if (data.status === 'success') {
            fill.style.width = '100%';
            fill.classList.add('success');
            document.getElementById('progress-percent').textContent = '100%';

            banner.classList.add('banner-success', 'visible');
            document.getElementById('banner-text').textContent = 'Skill completed successfully!';
            var actionBtn = document.getElementById('banner-action');
            actionBtn.href = '/skills/' + encodeURIComponent(skillName) + '/output/' + encodeURIComponent(executionId);
            actionBtn.textContent = 'View Output';

            headerIcon.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
            headerIcon.style.background = 'var(--success-muted)';
            headerIcon.style.color = 'var(--success)';
        } else {
            fill.classList.add('error');
            banner.classList.add('banner-error', 'visible');
            document.getElementById('banner-text').textContent = data.error_message || 'Execution failed.';
            var actionBtn2 = document.getElementById('banner-action');
            actionBtn2.href = '/skills/' + encodeURIComponent(skillName) + '/execute';
            actionBtn2.textContent = 'Try Again';

            headerIcon.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            headerIcon.style.background = 'var(--error-muted)';
            headerIcon.style.color = 'var(--error)';
        }
    }

    // Cancel
    window.cancelExecution = async function() {
        if (!executionId) return;
        var btn = document.getElementById('btn-cancel');
        btn.disabled = true;
        btn.textContent = 'Cancelling...';

        try {
            await fetch('/api/v2/executions/' + encodeURIComponent(executionId) + '/cancel', {
                method: 'POST'
            });
        } catch (e) {
            console.warn('Cancel error:', e);
            showToast('Failed to cancel execution', 'error');
        }
    };

    startPolling();
})();
</script>
{% endblock %}
