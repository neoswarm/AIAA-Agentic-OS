{# Deploy Progress Component - Progress indicator for deployment wizard Step 3 #}
{% macro deploy_progress(steps) %}
<div class="deploy-progress">
    {% for step in steps %}
    <div class="progress-step" data-step="{{ loop.index }}" data-status="pending">
        <div class="progress-step-icon">
            <div class="spinner"></div>
            <svg class="checkmark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="progress-step-content">
            <div class="progress-step-title">{{ step.title }}</div>
            <div class="progress-step-message"></div>
        </div>
    </div>
    {% endfor %}
</div>

<style>
.deploy-progress {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.progress-step {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem;
    background: var(--bg-elevated);
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
    transition: all 0.3s;
}

.progress-step[data-status="pending"] {
    opacity: 0.5;
}

.progress-step[data-status="active"] {
    opacity: 1;
    border-color: var(--accent);
}

.progress-step[data-status="completed"] {
    opacity: 1;
    border-color: var(--success);
}

.progress-step[data-status="error"] {
    opacity: 1;
    border-color: var(--error);
}

.progress-step-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
}

.progress-step[data-status="pending"] .progress-step-icon {
    background: var(--bg-hover);
}

.progress-step[data-status="active"] .progress-step-icon {
    background: var(--accent-muted);
}

.progress-step[data-status="completed"] .progress-step-icon {
    background: var(--success-muted);
}

.progress-step[data-status="error"] .progress-step-icon {
    background: var(--error-muted);
}

.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
}

.progress-step[data-status="active"] .spinner {
    display: block;
}

.checkmark {
    color: var(--success);
    display: none;
}

.progress-step[data-status="completed"] .checkmark {
    display: block;
}

.progress-step-content {
    flex: 1;
}

.progress-step-title {
    font-weight: 500;
    font-size: 0.9375rem;
    margin-bottom: 0.25rem;
}

.progress-step-message {
    font-size: 0.8125rem;
    color: var(--text-muted);
}

.progress-step[data-status="error"] .progress-step-message {
    color: var(--error);
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
{% endmacro %}
