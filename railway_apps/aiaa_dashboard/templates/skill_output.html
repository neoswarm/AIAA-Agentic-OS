{% extends "base.html" %}

{% block title %}Output - AIAA{% endblock %}

{% block extra_css %}
<style>
/* Output Header */
.output-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.output-header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.output-header-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--success-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--success);
    flex-shrink: 0;
}

.output-header-icon svg {
    width: 22px;
    height: 22px;
}

.output-header-title {
    font-size: 1.25rem;
    font-weight: 600;
}

.output-header-meta {
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 0.125rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.output-header-meta span {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
}

/* Action Buttons Bar */
.output-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
}

.action-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 0.875rem;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
}

.action-btn:hover {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border-color: var(--border);
}

.action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
}

.action-btn.primary:hover {
    background: var(--accent-hover);
}

.action-btn svg {
    width: 16px;
    height: 16px;
}

.action-btn .copy-feedback {
    display: none;
}

.action-btn.copied .copy-label {
    display: none;
}

.action-btn.copied .copy-feedback {
    display: inline;
}

/* Preview Card */
.preview-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    overflow: hidden;
}

.preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-subtle);
}

.preview-tabs {
    display: flex;
    gap: 0;
    background: var(--bg-elevated);
    border-radius: 6px;
    padding: 0.2rem;
}

.preview-tab {
    padding: 0.375rem 0.75rem;
    background: transparent;
    border: none;
    border-radius: 5px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
}

.preview-tab.active {
    background: var(--bg-surface);
    color: var(--text-primary);
}

.preview-body {
    padding: 1.5rem;
}

/* Rendered markdown styles */
.markdown-preview {
    font-size: 0.9375rem;
    line-height: 1.7;
    color: var(--text-primary);
}

.markdown-preview h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin: 1.5rem 0 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-subtle);
}

.markdown-preview h2 {
    font-size: 1.25rem;
    font-weight: 600;
    margin: 1.25rem 0 0.5rem;
}

.markdown-preview h3 {
    font-size: 1.0625rem;
    font-weight: 600;
    margin: 1rem 0 0.5rem;
}

.markdown-preview p {
    margin-bottom: 0.75rem;
}

.markdown-preview ul,
.markdown-preview ol {
    margin-bottom: 0.75rem;
    padding-left: 1.5rem;
}

.markdown-preview li {
    margin-bottom: 0.25rem;
}

.markdown-preview blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.5rem 1rem;
    margin: 0.75rem 0;
    background: var(--bg-elevated);
    border-radius: 0 6px 6px 0;
    color: var(--text-secondary);
}

.markdown-preview code {
    font-family: 'DM Mono', monospace;
    font-size: 0.8125rem;
    background: var(--bg-elevated);
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    color: var(--accent);
}

.markdown-preview pre {
    background: var(--bg-base);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    margin: 0.75rem 0;
}

.markdown-preview pre code {
    background: none;
    padding: 0;
    color: var(--text-primary);
}

.markdown-preview strong {
    font-weight: 600;
}

.markdown-preview a {
    color: var(--accent);
    text-decoration: underline;
}

.markdown-preview hr {
    border: none;
    border-top: 1px solid var(--border-subtle);
    margin: 1.5rem 0;
}

/* Raw view */
.raw-output {
    display: none;
    background: var(--bg-base);
    padding: 1rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8125rem;
    line-height: 1.6;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 600px;
    overflow-y: auto;
}

.raw-output.visible {
    display: block;
}

.markdown-preview.hidden-view {
    display: none;
}

/* Details Section */
.details-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    overflow: hidden;
}

.details-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 1rem 1.25rem;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
}

.details-toggle:hover {
    background: var(--bg-elevated);
}

.details-toggle svg {
    transition: transform 0.2s;
}

.details-toggle.open svg {
    transform: rotate(90deg);
}

.details-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
}

.details-body.visible {
    display: block;
}

.details-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 0.8125rem;
}

.details-row:last-child {
    border-bottom: none;
}

.details-row .detail-label {
    color: var(--text-muted);
}

.details-row .detail-value {
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 0.8125rem;
    text-align: right;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Loading state */
.output-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    color: var(--text-muted);
    gap: 1rem;
}

.spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 600px) {
    .output-header {
        flex-direction: column;
    }

    .output-actions {
        flex-wrap: wrap;
    }

    .action-btn {
        flex: 1;
        min-width: 120px;
        justify-content: center;
    }
}
</style>
{% endblock %}

{% block content %}
<!-- Loading State -->
<div class="output-loading" id="output-loading">
    <div class="spinner"></div>
    <span>Loading output...</span>
</div>

<!-- Main Content (hidden until loaded) -->
<div id="output-content" style="display: none;">
    <!-- Output Header -->
    <div class="output-header">
        <div class="output-header-left">
            <div class="output-header-icon" id="output-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div>
                <div class="output-header-title" id="output-title">Completed</div>
                <div class="output-header-meta" id="output-meta">
                    <span id="meta-duration"></span>
                    <span id="meta-words"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="output-actions">
        <button class="action-btn" id="btn-copy" onclick="copyOutput()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span class="copy-label">Copy</span>
            <span class="copy-feedback">Copied!</span>
        </button>
        <button class="action-btn" id="btn-download" onclick="downloadOutput()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download .md
        </button>
        <button class="action-btn" id="btn-gdocs" onclick="sendToGoogleDocs()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Google Docs
        </button>
        <a class="action-btn primary" id="btn-rerun" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
            Re-run
        </a>
    </div>

    <!-- Preview -->
    <div class="preview-card">
        <div class="preview-header">
            <span class="card-title">Output</span>
            <div class="preview-tabs">
                <button class="preview-tab active" id="tab-preview" onclick="switchView('preview')">Preview</button>
                <button class="preview-tab" id="tab-raw" onclick="switchView('raw')">Raw</button>
            </div>
        </div>
        <div class="preview-body">
            <div class="markdown-preview" id="markdown-preview"></div>
            <div class="raw-output" id="raw-output"></div>
        </div>
    </div>

    <!-- Details -->
    <div class="details-card">
        <button class="details-toggle" id="details-toggle" onclick="toggleDetails()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
            Details
        </button>
        <div class="details-body" id="details-body">
            <div class="details-row">
                <span class="detail-label">Skill</span>
                <span class="detail-value" id="detail-skill">-</span>
            </div>
            <div class="details-row">
                <span class="detail-label">Execution ID</span>
                <span class="detail-value" id="detail-exec-id">-</span>
            </div>
            <div class="details-row">
                <span class="detail-label">Duration</span>
                <span class="detail-value" id="detail-duration">-</span>
            </div>
            <div class="details-row">
                <span class="detail-label">Cost Estimate</span>
                <span class="detail-value" id="detail-cost">-</span>
            </div>
            <div class="details-row">
                <span class="detail-label">Output Files</span>
                <span class="detail-value" id="detail-files">-</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var executionId = getExecutionIdFromUrl();
    var skillName = getSkillNameFromUrl();
    var rawContent = '';

    function getExecutionIdFromUrl() {
        var parts = window.location.pathname.split('/');
        return parts[parts.length - 1] || null;
    }

    function getSkillNameFromUrl() {
        var parts = window.location.pathname.split('/');
        var idx = parts.indexOf('skills');
        if (idx >= 0 && parts[idx + 1]) return decodeURIComponent(parts[idx + 1]);
        return null;
    }

    function formatSkillName(name) {
        return (name || '').replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function formatDuration(ms) {
        if (!ms) return '-';
        var secs = Math.floor(ms / 1000);
        var mins = Math.floor(secs / 60);
        secs = secs % 60;
        if (mins > 0) return mins + 'm ' + secs + 's';
        return secs + 's';
    }

    function countWords(text) {
        if (!text) return 0;
        return text.trim().split(/\s+/).filter(function(w) { return w.length > 0; }).length;
    }

    // Basic markdown to HTML (no external lib)
    function renderMarkdown(text) {
        if (!text) return '<p style="color: var(--text-muted);">No output content.</p>';

        var html = escapeHtml(text);

        // Headings
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Bold & Italic
        html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Blockquotes
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

        // Horizontal rules
        html = html.replace(/^---$/gm, '<hr>');

        // Unordered lists
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
        // Remove nested ul groups
        html = html.replace(/<\/ul>\s*<ul>/g, '');

        // Paragraphs (wrap remaining lines)
        html = html.replace(/^(?!<[hlubo]|<\/)(.+)$/gm, '<p>$1</p>');

        // Clean up empty paragraphs
        html = html.replace(/<p><\/p>/g, '');

        return html;
    }

    // Load output
    async function loadOutput() {
        if (!executionId) return;

        try {
            var res = await fetch('/api/v2/executions/' + encodeURIComponent(executionId) + '/output');
            if (!res.ok) throw new Error('Failed to load output');
            var data = await res.json();

            rawContent = data.content || data.output || data.output_preview || '';
            var wordCount = countWords(rawContent);

            // Set header info
            document.getElementById('output-title').textContent = 'Completed: ' + formatSkillName(data.skill_name || skillName);
            document.getElementById('meta-duration').textContent = 'Duration: ' + formatDuration(data.duration_ms);
            if (wordCount > 0) {
                document.getElementById('meta-words').textContent = 'Words: ' + wordCount.toLocaleString();
            }

            // Render preview
            document.getElementById('markdown-preview').innerHTML = renderMarkdown(rawContent);
            document.getElementById('raw-output').textContent = rawContent;

            // Fill details
            document.getElementById('detail-skill').textContent = data.skill_name || skillName || '-';
            document.getElementById('detail-exec-id').textContent = executionId;
            document.getElementById('detail-duration').textContent = formatDuration(data.duration_ms);
            document.getElementById('detail-cost').textContent = data.cost_estimate ? '$' + data.cost_estimate.toFixed(2) : 'N/A';
            document.getElementById('detail-files').textContent = data.output_path || '-';

            // Set re-run link
            document.getElementById('btn-rerun').href = '/skills/' + encodeURIComponent(data.skill_name || skillName) + '/execute';

            // Show content
            document.getElementById('output-loading').style.display = 'none';
            document.getElementById('output-content').style.display = 'block';

            // Handle error state
            if (data.status === 'error') {
                var icon = document.getElementById('output-icon');
                icon.style.background = 'var(--error-muted)';
                icon.style.color = 'var(--error)';
                icon.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            }
        } catch (e) {
            document.getElementById('output-loading').innerHTML = '<span style="color: var(--error);">Failed to load output. <a href="javascript:location.reload()" style="color:var(--accent);">Retry</a></span>';
        }
    }

    // View switching
    window.switchView = function(view) {
        document.getElementById('tab-preview').classList.toggle('active', view === 'preview');
        document.getElementById('tab-raw').classList.toggle('active', view === 'raw');
        document.getElementById('markdown-preview').classList.toggle('hidden-view', view !== 'preview');
        document.getElementById('raw-output').classList.toggle('visible', view === 'raw');
    };

    // Toggle details
    window.toggleDetails = function() {
        var toggle = document.getElementById('details-toggle');
        var body = document.getElementById('details-body');
        toggle.classList.toggle('open');
        body.classList.toggle('visible');
    };

    // Copy to clipboard
    window.copyOutput = async function() {
        try {
            await navigator.clipboard.writeText(rawContent);
            var btn = document.getElementById('btn-copy');
            btn.classList.add('copied');
            setTimeout(function() { btn.classList.remove('copied'); }, 2000);
        } catch (e) {
            showToast('Failed to copy to clipboard', 'error');
        }
    };

    // Download as .md
    window.downloadOutput = function() {
        var blob = new Blob([rawContent], { type: 'text/markdown' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = (skillName || 'output') + '.md';
        a.click();
        URL.revokeObjectURL(url);
    };

    // Send to Google Docs
    window.sendToGoogleDocs = async function() {
        try {
            var res = await fetch('/api/v2/executions/' + encodeURIComponent(executionId) + '/deliver/gdocs', {
                method: 'POST'
            });
            if (!res.ok) throw new Error('Failed');
            var data = await res.json();
            if (data.url) {
                window.open(data.url, '_blank');
            }
            showToast('Sent to Google Docs!', 'success');
        } catch (e) {
            showToast('Could not send to Google Docs. Check settings.', 'warning');
        }
    };

    loadOutput();
})();
</script>
{% endblock %}
