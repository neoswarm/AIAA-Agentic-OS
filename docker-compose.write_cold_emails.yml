version: '3.8'

services:
  write-cold-emails:
    build:
      context: .
      dockerfile: Dockerfile.write_cold_emails
    environment:
      - OPENAI_API_KEY=${{var}}
      - OPENROUTER_API_KEY=${{var}}
      - PERPLEXITY_API_KEY=${{var}}
    volumes:
      - ./.tmp:/app/.tmp
    restart: unless-stopped

