<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANS/PANDAS Health Assessment | Resilience Naturopathic</title>
<style>
  :root {
    --teal: #0C6A7F;
    --teal-dark: #094f5f;
    --teal-light: #e8f4f6;
    --navy: #294765;
    --navy-light: #eef1f5;
    --white: #FFFFFF;
    --text: #4A4E57;
    --text-light: #6b7280;
    --border: #d1e7ec;
    --success: #10b981;
    --warning: #f59e0b;
    --bg: #f7fbfc;
    --shadow: 0 4px 24px rgba(12,106,127,0.10);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .site-header {
    background: var(--teal);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(12,106,127,0.25);
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: var(--white);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .site-header h1 {
    color: var(--white);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .site-header p {
    color: rgba(255,255,255,0.8);
    font-size: 0.75rem;
  }

  /* Progress */
  .progress-bar-wrap {
    background: var(--border);
    height: 5px;
  }
  .progress-bar-fill {
    background: var(--teal);
    height: 5px;
    transition: width 0.4s ease;
  }

  /* Container */
  .app-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Step header */
  .step-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .step-badge {
    background: var(--teal-light);
    color: var(--teal);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .step-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .step-subtitle {
    color: var(--text-light);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  /* Cards (option selector) */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .options-grid.two-col { grid-template-columns: 1fr 1fr; }
  .options-grid.three-col { grid-template-columns: repeat(3, 1fr); }
  .option-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    background: var(--white);
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
  }
  .option-card:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .option-card.selected {
    border-color: var(--teal);
    background: var(--teal-light);
    box-shadow: 0 0 0 3px rgba(12,106,127,0.15);
  }
  .option-card .card-icon { font-size: 1.5rem; margin-bottom: 6px; }
  .option-card .card-label { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
  .option-card .card-sub { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; }
  .option-card.selected .card-label { color: var(--teal-dark); }

  /* Multi-select chips */
  .chip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .chip {
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 6px 16px;
    cursor: pointer;
    background: var(--white);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--teal); background: var(--teal-light); }
  .chip.selected {
    border-color: var(--teal);
    background: var(--teal);
    color: var(--white);
  }

  /* Input fields */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.15s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--teal); }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Slider */
  .slider-wrap { margin-bottom: 24px; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-light); margin-top: 4px; }
  input[type=range] {
    width: 100%;
    height: 6px;
    accent-color: var(--teal);
    cursor: pointer;
  }
  .slider-value {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--teal);
    margin: 8px 0 2px;
  }

  /* Buttons */
  .btn-primary {
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--teal);
    border: 2px solid var(--teal);
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--teal-light); }
  .btn-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

  /* Welcome card */
  .welcome-card {
    background: var(--white);
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--shadow);
    text-align: center;
    border-top: 5px solid var(--teal);
    margin-bottom: 24px;
  }
  .welcome-icon { font-size: 3rem; margin-bottom: 16px; }
  .welcome-card h2 { color: var(--navy); font-size: 1.5rem; margin-bottom: 10px; }
  .welcome-card p { color: var(--text-light); font-size: 0.92rem; max-width: 480px; margin: 0 auto 20px; }
  .feature-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .feature-pill {
    background: var(--teal-light);
    color: var(--teal-dark);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .disclaimer-mini {
    font-size: 0.72rem;
    color: var(--text-light);
    text-align: center;
    padding: 10px;
    background: #fff8e7;
    border-radius: 8px;
    border-left: 3px solid var(--warning);
    margin-top: 16px;
  }

  /* Review card */
  .review-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px 20px;
    margin-bottom: 10px;
  }
  .review-card h4 { font-size: 0.78rem; text-transform: uppercase; color: var(--text-light); margin-bottom: 4px; letter-spacing: 0.05em; }
  .review-card p { font-size: 0.92rem; color: var(--navy); font-weight: 500; }
  .review-edit { color: var(--teal); font-size: 0.8rem; cursor: pointer; text-decoration: underline; float: right; }

  /* Results */
  .results-hero {
    background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
    border-radius: 16px;
    padding: 28px 28px 24px;
    color: var(--white);
    text-align: center;
    margin-bottom: 20px;
  }
  .results-hero .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 24px;
    padding: 6px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .results-hero h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results-hero p { opacity: 0.9; font-size: 0.9rem; }

  .recommendation-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 10px;
  }
  .rec-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .rec-icon { font-size: 1.5rem; flex-shrink: 0; }
  .rec-title { font-weight: 700; color: var(--navy); font-size: 0.98rem; }
  .rec-match { font-size: 0.75rem; color: var(--teal); font-weight: 600; background: var(--teal-light); padding: 1px 8px; border-radius: 10px; display: inline-block; margin-bottom: 4px; }
  .rec-body { font-size: 0.85rem; color: var(--text-light); padding-left: 38px; }

  .cta-section {
    background: var(--navy);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    color: var(--white);
    margin-top: 24px;
  }
  .cta-section h3 { font-size: 1.2rem; margin-bottom: 8px; }
  .cta-section p { opacity: 0.8; font-size: 0.88rem; margin-bottom: 20px; }
  .cta-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .cta-btn-main {
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .cta-btn-main:hover { background: var(--teal-dark); }
  .cta-btn-alt {
    background: transparent;
    color: var(--white);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .cta-btn-alt:hover { border-color: white; }

  .action-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .action-btn {
    background: var(--teal-light);
    color: var(--teal-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--border); }

  /* Info box */
  .info-box {
    background: var(--teal-light);
    border-left: 4px solid var(--teal);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* Emergency */
  .emergency-banner {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #991b1b;
    margin-bottom: 16px;
    display: none;
  }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .options-grid.two-col { grid-template-columns: 1fr; }
    .options-grid.three-col { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .cta-buttons { flex-direction: column; }
    .app-container { padding: 16px 12px 48px; }
  }

  /* Fade animation */
  .step-panel { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<div class="site-header">
  <div class="logo-mark">💧</div>
  <div>
    <h1>Resilience Naturopathic</h1>
    <p>PANS/PANDAS Health Assessment</p>
  </div>
</div>

<!-- Progress Bar -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="app-container">
  <div id="appRoot"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  currentStep: 0,
  answers: {
    contact: { firstName: '', lastName: '', email: '', phone: '', childAge: '' },
    primaryConcern: '',
    symptoms: [],
    onsetType: '',
    duration: '',
    severity: 5,
    priorTreatments: [],
    triggers: [],
    goals: [],
    howHeard: '',
    notes: ''
  }
};

const TOTAL_STEPS = 12;

// ============================================================
// DATA
// ============================================================
const concernOptions = [
  { id: 'pans_pandas', icon: '🧠', label: 'PANS/PANDAS', sub: 'Diagnosed or suspected' },
  { id: 'sudden_behavior', icon: '⚡', label: 'Sudden Behavior Change', sub: 'Rapid onset symptoms' },
  { id: 'ocd_tics', icon: '🔁', label: 'OCD / Tics', sub: 'Compulsions, repetitive movements' },
  { id: 'anxiety_rage', icon: '😰', label: 'Anxiety / Rage', sub: 'Emotional dysregulation' },
  { id: 'sleep', icon: '🌙', label: 'Sleep Issues', sub: 'Insomnia, night terrors' },
  { id: 'gut_sensory', icon: '🌿', label: 'Gut / Sensory Issues', sub: 'Digestive, sensory sensitivities' },
  { id: 'adhd_asd', icon: '🌈', label: 'ADHD / ASD', sub: 'Attention, autism spectrum' },
  { id: 'other', icon: '💬', label: 'Other / Unsure', sub: 'Not sure where to start' }
];

const symptomOptions = [
  'Sudden OCD onset', 'Tics (motor or vocal)', 'Rage / aggression', 'Separation anxiety',
  'Personality change', 'Handwriting deterioration', 'Urinary urgency/frequency',
  'Sensory sensitivities', 'Food restriction/refusal', 'Sleep disturbances',
  'Hallucinations', 'Emotional lability', 'School refusal', 'Compulsions',
  'Deteriorating academic performance', 'Oppositional behavior', 'Brain fog',
  'Hyperactivity', 'Seizure-like episodes', 'Social withdrawal', 'Anxiety',
  'Depression', 'Panic attacks', 'Enuresis (bedwetting)'
];

const onsetOptions = [
  { id: 'overnight', icon: '🌙', label: 'Overnight', sub: 'Symptoms appeared within 24-48 hours' },
  { id: 'weeks', icon: '📅', label: 'Over weeks', sub: 'Gradually worsened over weeks' },
  { id: 'months', icon: '📆', label: 'Over months', sub: 'Slow progression over months' },
  { id: 'unsure', icon: '❓', label: 'Not sure', sub: 'Hard to pinpoint when it started' }
];

const durationOptions = [
  { id: 'under3m', icon: '🌱', label: 'Under 3 months', sub: 'Recently started' },
  { id: '3to12m', icon: '🌿', label: '3–12 months', sub: 'Several months' },
  { id: '1to3y', icon: '🌳', label: '1–3 years', sub: 'Over a year' },
  { id: 'over3y', icon: '🗓️', label: '3+ years', sub: 'Long-term struggle' }
];

const treatmentOptions = [
  'Antibiotics (long-term)', 'IVIG infusions', 'Psychiatric medications',
  'Behavioral therapy (CBT/ERP)', 'Anti-inflammatories (NSAIDs)', 'Plasmapheresis',
  'Supplements/vitamins', 'Other naturopathic care', 'Dietary changes',
  'Nothing yet — just getting started', 'Other conventional medicine'
];

const triggerOptions = [
  'Strep infection (confirmed)', 'Strep exposure (unconfirmed)', 'Other infection (viral/bacterial)',
  'Mold exposure', 'Stress/illness', 'Vaccine', 'Unknown trigger', 'Multiple triggers'
];

const goalOptions = [
  { id: 'symptom_relief', icon: '🎯', label: 'Symptom relief', sub: 'Reduce or eliminate symptoms' },
  { id: 'root_cause', icon: '🔬', label: 'Find root cause', sub: 'Understand what\'s driving it' },
  { id: 'long_term_healing', icon: '🌟', label: 'Long-term healing', sub: 'Sustainable recovery' },
  { id: 'natural_approach', icon: '🌿', label: 'Natural approach', sub: 'Avoid or reduce medications' },
  { id: 'reduce_flares', icon: '🛡️', label: 'Reduce flare-ups', sub: 'Prevent future episodes' },
  { id: 'family_support', icon: '👨‍👩‍👧', label: 'Family support', sub: 'Help the whole family cope' }
];

const howHeardOptions = [
  'Google search', 'Facebook group', 'Instagram', 'Podcast (Mom & Doc Talk)',
  'Parent community / word of mouth', 'Doctor referral', 'Other'
];

// ============================================================
// RECOMMENDATION ENGINE
// ============================================================
function generateRecommendations(a) {
  const recs = [];
  const concern = a.primaryConcern;
  const symptoms = a.symptoms || [];
  const priorTx = a.priorTreatments || [];
  const onset = a.onsetType;

  // Always recommend initial consultation
  recs.push({
    icon: '📞',
    title: 'Free Client Guide Consultation',
    match: 'Perfect fit',
    body: 'Start with a no-cost, 45-minute call with a PANS/PANDAS parent who has walked in your shoes. They\'ll help determine if Resilience is the right fit and answer all your questions.'
  });

  // PANS/PANDAS or sudden onset
  if (['pans_pandas', 'sudden_behavior', 'ocd_tics', 'anxiety_rage'].includes(concern) || onset === 'overnight') {
    recs.push({
      icon: '🧠',
      title: 'Initial Homeopathic Intake (3 Hours)',
      match: 'Highly recommended',
      body: 'A comprehensive 2-3 hour deep-dive into your child\'s complete history. Dr. Bahr\'s team will identify the single homeopathic remedy that best matches your child\'s unique symptom picture.'
    });
  }

  // Tried everything
  if (priorTx.includes('Antibiotics (long-term)') || priorTx.includes('IVIG infusions') || priorTx.includes('Psychiatric medications')) {
    recs.push({
      icon: '💊',
      title: 'Post-Conventional Care Support',
      match: 'Specialized pathway',
      body: 'Our providers are experienced with children who have been through IVIG, long-term antibiotics, and psychiatric medications. Classical homeopathy can work alongside or as an alternative — we\'ll meet your child where they are.'
    });
  }

  // Long duration
  if (['1to3y', 'over3y'].includes(a.duration)) {
    recs.push({
      icon: '🗓️',
      title: 'Long-Term Recovery Program',
      match: 'Your situation',
      body: 'Complex, long-standing PANS/PANDAS cases are our specialty. Expect an 18-24 month healing journey with monthly follow-ups. Many families see gradual, sustainable improvement over time.'
    });
  }

  // Monthly commitment
  recs.push({
    icon: '📅',
    title: 'Monthly Follow-Up Care ($198/month)',
    match: 'Ongoing care',
    body: '30-minute monthly visits by phone or video. Your provider tracks your child\'s remedy response, adjusts as needed, and provides no-cost email support between appointments.'
  });

  // Podcast
  recs.push({
    icon: '🎙️',
    title: 'Mom & Doc Talk Podcast',
    match: 'Educational resource',
    body: 'Over 100 episodes with leading PANS/PANDAS experts. Start with Dr. Bahr\'s foundational episodes on how classical homeopathy heals PANS/PANDAS from the inside out.'
  });

  return recs;
}

// ============================================================
// RENDERER
// ============================================================
const root = document.getElementById('appRoot');

function updateProgress(step) {
  const pct = Math.round((step / TOTAL_STEPS) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

function stepBadge(n) {
  return `<div class="step-meta"><span class="step-badge">Step ${n} of ${TOTAL_STEPS}</span></div>`;
}

function renderStep(n) {
  updateProgress(n);
  saveProgress();
  switch(n) {
    case 0: renderWelcome(); break;
    case 1: renderContact(); break;
    case 2: renderPrimaryConcern(); break;
    case 3: renderSymptoms(); break;
    case 4: renderOnsetType(); break;
    case 5: renderDuration(); break;
    case 6: renderSeverity(); break;
    case 7: renderPriorTreatments(); break;
    case 8: renderTriggers(); break;
    case 9: renderGoals(); break;
    case 10: renderHowHeard(); break;
    case 11: renderReview(); break;
    case 12: renderResults(); break;
  }
}

// ---- WELCOME ----
function renderWelcome() {
  root.innerHTML = `
    <div class="step-panel">
      <div class="welcome-card">
        <div class="welcome-icon">💧</div>
        <h2>Is Classical Homeopathy Right for Your Child's PANS/PANDAS?</h2>
        <p>This 5-minute assessment helps us understand your child's situation and determine how Resilience Naturopathic can support your family's healing journey.</p>
        <div class="feature-pills">
          <span class="feature-pill">✓ Free 45-min Consultation</span>
          <span class="feature-pill">✓ 10+ Years Experience</span>
          <span class="feature-pill">✓ 13 Naturopathic Doctors</span>
          <span class="feature-pill">✓ Worldwide Virtual Care</span>
        </div>
        <button class="btn-primary" onclick="go(1)" style="font-size:1.05rem;padding:16px 40px;">
          Begin Assessment →
        </button>
        <div class="disclaimer-mini">
          ⚠️ This assessment is for informational purposes only and does not constitute medical advice or diagnosis. If your child is experiencing a mental health emergency, please call 988 or 911 immediately.
        </div>
      </div>
    </div>`;
}

// ---- CONTACT ----
function renderContact() {
  const c = state.answers.contact;
  root.innerHTML = `
    <div class="step-panel">
      ${stepBadge(1)}
      <h2 class="step-title">Tell us about your family</h2>
      <p class="step-subtitle">We'll use this to personalize your assessment results and reach out if you'd like a consultation.</p>
      <div class="form-row">
        <div class="form-group">
          <label>Parent/Guardian First Name *</label>
          <input type="text" id="firstName" value="${c.firstName}" placeholder="Jane" />
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" id="lastName" value="${c.lastName}" placeholder="Smith" />
        </div>
      </div>
      <div class="form-group">

// ============================================================
// HELPERS
// ============================================================
function go(n) {
  state.currentStep = n;
  renderStep(n);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function selectSingle(field, value, el) {
  state.answers[field] = value;
  el.closest('.options-grid').querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleCard(field, value, el) {
  const arr = state.answers[field];
  const idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); el.classList.remove('selected'); }
  else { arr.push(value); el.classList.add('selected'); }
}

function toggleChip(field, value, el) {
  const arr = state.answers[field];
  const idx = arr.indexOf(value);
  if (idx >= 0) { arr.splice(idx, 1); el.classList.remove('selected'); }
  else { arr.push(value); el.classList.add('selected'); }
}

function copyResults() {
  const a = state.answers;
  const c = a.contact;
  const text = `PANS/PANDAS Health Assessment - Resilience Naturopathic
Name: ${c.firstName} ${c.lastName}
Email: ${c.email}
Child Age: ${c.childAge}
Primary Concern: ${a.primaryConcern}
Symptoms: ${a.symptoms.join(', ')}
Onset: ${a.onsetType} | Duration: ${a.duration} | Severity: ${a.severity}/10
Prior Treatments: ${a.priorTreatments.join(', ')}
Triggers: ${a.triggers.join(', ')}
Goals: ${a.goals.join(', ')}
Book Free Consultation: https://resiliencenaturopathic.com/contact-us/
(858) 461-8121 | support@resiliencenaturopathic.com`;
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => alert('Please use the Print option instead.'));
}

function exportJSON() {
  const data = JSON.stringify({assessment: state.answers, generated: new Date().toISOString(), practice: 'Resilience Naturopathic'}, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `resilience-assessment-${state.answers.contact.firstName || 'results'}.json`;
  a.click();
}

function saveProgress() {
  try { localStorage.setItem('rn_assessment', JSON.stringify(state)); } catch(e) {}
}

function loadProgress() {
  try {
    const saved = localStorage.getItem('rn_assessment');
    if (saved) {
      const s = JSON.parse(saved);
      if (s.answers) Object.assign(state.answers, s.answers);
    }
  } catch(e) {}
}

function startOver() {
  if (!confirm('Start a new assessment? Your current progress will be cleared.')) return;
  state.answers = {
    contact: { firstName: '', lastName: '', email: '', phone: '', childAge: '' },
    primaryConcern: '', symptoms: [], onsetType: '', duration: '', severity: 5,
    priorTreatments: [], triggers: [], goals: [], howHeard: '', notes: ''
  };
  try { localStorage.removeItem('rn_assessment'); } catch(e) {}
  go(0);
}

// ============================================================
// INIT
// ============================================================
loadProgress();
renderStep(state.currentStep);
</script>
